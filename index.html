<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        // Authentication Guard
        if (localStorage.getItem('bookvault_logged_in') !== 'true') {
            window.location.replace('login.html');
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookVault | Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar glass" id="sidebar">
        <div class="logo">
            <i class="fas fa-book-open"></i> BookVault
        </div>
        <ul class="nav-links">
            <li class="nav-item"><a href="index.html" class="active"><i class="fas fa-chart-pie"></i> Dashboard</a></li>
            <li class="nav-item"><a href="library.html"><i class="fas fa-bookmark"></i> My Library</a></li>
            <li class="nav-item"><a href="profile.html"><i class="fas fa-user-circle"></i> My Profile</a></li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Topbar -->
        <header class="topbar">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <button class="icon-btn menu-toggle" id="menu-toggle"><i class="fas fa-bars"></i></button>
                <h1 style="font-size: 1.5rem;">Reading Analytics</h1>
            </div>
            <div class="topbar-actions">
                <button class="icon-btn" id="theme-toggle"><i class="fas fa-moon"></i></button>
                <a href="profile.html" class="profile-widget" id="profile-widget" style="text-decoration: none;">
                    <img src="user_avatar.png" alt="Aarav Sharma" class="profile-avatar">
                    <div class="profile-details">
                        <span class="profile-name">Aarav Sharma</span>
                        <span class="profile-role">Premium Member</span>
                    </div>
                </a>
            </div>
        </header>

        <!-- KPI Cards -->
        <div class="kpi-grid">
            <div class="kpi-card glass">
                <div class="kpi-icon" style="background: rgba(79, 70, 229, 0.1); color: #4F46E5;">
                    <i class="fas fa-book"></i>
                </div>
                <div class="kpi-info">
                    <h3>Total Books</h3>
                    <p id="kpi-total">0</p>
                </div>
            </div>
            
            <div class="kpi-card glass">
                <div class="kpi-icon" style="background: rgba(16, 185, 129, 0.1); color: #10B981;">
                    <i class="fas fa-check-circle"></i>
                </div>
                <div class="kpi-info">
                    <h3>Completed</h3>
                    <p id="kpi-completed">0</p>
                </div>
            </div>
            
            <div class="kpi-card glass">
                <div class="kpi-icon" style="background: rgba(245, 158, 11, 0.1); color: #F59E0B;">
                    <i class="fas fa-book-reader"></i>
                </div>
                <div class="kpi-info">
                    <h3>Currently Reading</h3>
                    <p id="kpi-reading">0</p>
                </div>
            </div>

            <div class="kpi-card glass">
                <div class="kpi-icon" style="background: rgba(239, 68, 68, 0.1); color: #EF4444;">
                    <i class="fas fa-heart"></i>
                </div>
                <div class="kpi-info">
                    <h3>Favorite Genre</h3>
                    <p id="kpi-genre" style="font-size: 1.2rem;">-</p>
                </div>
            </div>
        </div>

        <!-- Charts Area -->
        <div class="charts-grid">
            <div class="chart-container glass">
                <div class="section-header">
                    <h2>Reading Progress Over Time</h2>
                </div>
                <div style="height: 300px; width: 100%;">
                    <canvas id="progressChart"></canvas>
                </div>
            </div>
            
            <div class="chart-container glass">
                <div class="section-header">
                    <h2>Genre Distribution</h2>
                </div>
                <div style="height: 300px; width: 100%; display: flex; justify-content: center;">
                    <canvas id="genreChart"></canvas>
                </div>
            </div>
        </div>

    </main>

    <script src="app.js"></script>
    <script src="charts.js"></script>
</body>
</html>
